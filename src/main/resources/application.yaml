spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

app:
  auth:
    username: ${APP_USERNAME:admin}
    password: ${APP_PASSWORD:admin}
    jwt-secret: ${JWT_SECRET:changeme-use-a-long-random-secret-in-production}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
